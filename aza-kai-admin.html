<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion AZA & KAI - LeGrandArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #f8fafc; }
        .glass-card { background: rgba(10, 10, 11, 0.75); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(18px); }
        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; font-weight: bold; z-index: 100; transform: translateY(150%); transition: 0.3s; }
        .toast.show { transform: translateY(0); }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-ok { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-sync { background: #f59e0b; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .product-img-placeholder { width: 65px; height: 65px; object-fit: cover; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <header class="bg-black/90 backdrop-blur-xl border-b border-white/10 py-5 px-6 sticky top-0 z-50">
        <div class="max-w-[1200px] mx-auto flex justify-between items-center">
            <a href="index.html" class="flex flex-col leading-none">
                <span class="text-xl font-black text-white uppercase">Aza & Kai <span class="text-yellow-400">Admin</span></span>
                <span class="text-[9px] uppercase tracking-widest text-emerald-400 font-bold mt-1">Système de gestion de stock</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition">Accueil</a>
                <div class="hidden md:flex items-center text-[10px] uppercase font-bold text-gray-500">
                    <span id="sync-indicator" class="status-dot status-ok"></span>
                    <span id="sync-text">Stock Live Connecté</span>
                </div>
                <button onclick="logout()" class="text-[10px] font-black uppercase tracking-widest text-red-400 hover:text-white transition">Déconnexion</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-6 py-12 space-y-12">
        <!-- Section Formulaire -->
        <section class="glass-card p-8 rounded-[2.5rem]">
            <div class="flex flex-col mb-8">
                <h2 class="text-2xl font-black uppercase tracking-tighter text-white">Nouveau <span class="text-yellow-400">Produit</span></h2>
                <p class="text-[10px] text-gray-500 uppercase font-bold mt-1">Envoi immédiat vers la base de données</p>
            </div>
            
            <form id="add-product-form" class="grid gap-6 md:grid-cols-3">
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Nom de l'article</label>
                    <input type="text" id="p-nom" required class="w-full rounded-xl px-5 py-3 outline-none focus:border-yellow-500 transition-all" placeholder="Ex: Robe Soirée">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Prix de vente ($)</label>
                    <input type="number" id="p-prix" required class="w-full rounded-xl px-5 py-3 outline-none focus:border-yellow-500 transition-all" placeholder="0.00">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Quantité en stock</label>
                    <input type="number" id="p-quantite" required class="w-full rounded-xl px-5 py-3 outline-none focus:border-yellow-500 transition-all" placeholder="0">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Code / Référence</label>
                    <input type="text" id="p-abreviation" class="w-full rounded-xl px-5 py-3 outline-none focus:border-yellow-500 transition-all" placeholder="Ex: AK-01">
                </div>
                <div class="space-y-2 md:col-span-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Description</label>
                    <textarea id="p-desc" required rows="1" class="w-full rounded-xl px-5 py-3 outline-none focus:border-yellow-500 transition-all" placeholder="Détails du produit..."></textarea>
                </div>
                <button type="submit" id="submit-btn" class="md:col-span-3 bg-white hover:bg-yellow-400 hover:text-black text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-plus-circle"></i> Ajouter au catalogue
                </button>
            </form>
        </section>

        <!-- Section Liste Premium -->
        <section class="space-y-6">
            <div class="flex justify-between items-end border-b border-white/10 pb-4">
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tighter text-white">Stock <span class="text-emerald-400">Actuel</span></h2>
                    <p class="text-[10px] text-gray-500 uppercase font-bold mt-1">Gestion des articles et soumission d'images</p>
                </div>
                <button onclick="loadAdminProducts()" class="text-[10px] text-gray-400 hover:text-white uppercase font-bold transition flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i> Actualiser
                </button>
            </div>

            <div id="admin-product-list" class="grid gap-4 md:grid-cols-1 lg:grid-cols-1">
                <!-- Les articles s'affichent ici -->
            </div>
        </section>
    </main>

    <div id="custom-toast" class="toast"></div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbypuG5CjVBMTTo1uWHX8a8vPKjkaOiVEGIauGlFykncCMJMxxDoDG6IbgAyVTctTmeX/exec";

        function showToast(msg, error = false) {
            const t = document.getElementById('custom-toast');
            t.innerText = msg;
            t.style.background = error ? '#ef4444' : '#10b981';
            t.style.color = error ? '#fff' : '#000';
            t.className = 'toast show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function updateSyncUI(isSyncing) {
            const dot = document.getElementById('sync-indicator');
            const text = document.getElementById('sync-text');
            if(isSyncing) {
                dot.className = "status-dot status-sync";
                text.innerText = "Synchronisation...";
            } else {
                dot.className = "status-dot status-ok";
                text.innerText = "Stock Live Connecté";
            }
        }

        // Fonction de récupération de valeur améliorée
        function getSpecValue(obj, synonyms, priorityIndex = -1) {
            if (!obj) return null;
            const keys = Object.keys(obj);
            
            // Si on a un index de colonne forcé (ex: prix est souvent 2eme colonne)
            if (priorityIndex >= 0 && keys[priorityIndex]) {
                 const val = obj[keys[priorityIndex]];
                 if (val !== undefined && val !== "") return val;
            }

            for (let syn of synonyms) {
                const found = keys.find(k => k.toLowerCase().trim() === syn.toLowerCase());
                if (found !== undefined) return obj[found];
            }
            return null;
        }

        async function loadAdminProducts() {
            const container = document.getElementById('admin-product-list');
            updateSyncUI(true);
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="glass-card p-12 rounded-[2.5rem] text-center text-gray-500 font-bold uppercase text-xs tracking-widest">Aucun produit en stock</div>`;
                    return;
                }

                container.innerHTML = data.map(p => {
                    // Extraction précise
                    const keys = Object.keys(p);
                    const nom = getSpecValue(p, ['nom', 'article', 'produit', 'designation'], 0) || 'Article Sans Nom';
                    const prix = getSpecValue(p, ['prix', 'price', 'coût'], 1) || '0';
                    const qte = getSpecValue(p, ['quantite', 'stock', 'qte'], 3) || '0';
                    const ref = getSpecValue(p, ['abreviation', 'ref', 'code'], 4) || 'N/A';
                    const desc = getSpecValue(p, ['description', 'info'], 2) || '';
                    const img = getSpecValue(p, ['image', 'photo', 'url', 'pic'], 5) || '';

                    return `
                    <div class="glass-card p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6 transition-all hover:border-white/20 group">
                        <div class="flex items-center gap-6 w-full md:w-auto">
                            <!-- Espace Image Article -->
                            <div class="product-img-placeholder text-gray-600 overflow-hidden">
                                ${img ? `<img src="${img}" class="w-full h-full object-cover">` : '<i class="fas fa-image text-xl"></i>'}
                            </div>
                            
                            <div class="flex-1">
                                <div class="flex items-center gap-3">
                                    <h4 class="font-black text-white text-lg uppercase leading-tight">${nom}</h4>
                                    <span class="text-[8px] bg-white/10 px-2 py-0.5 rounded text-gray-400 font-bold uppercase tracking-widest">${ref}</span>
                                </div>
                                <p class="text-gray-500 text-[11px] font-medium mt-1 line-clamp-1">${desc}</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between md:justify-end w-full md:w-auto gap-10 border-t border-white/5 md:border-none pt-5 md:pt-0">
                            <div class="text-center md:text-right">
                                <p class="text-[9px] uppercase font-black text-gray-500 tracking-widest mb-1">PRIX $</p>
                                <p class="text-yellow-400 font-black text-2xl">${prix}$</p>
                            </div>
                            
                            <div class="text-center md:text-right">
                                <p class="text-[9px] uppercase font-black text-gray-500 tracking-widest mb-1">Stock</p>
                                <p class="text-white font-black text-2xl">${qte}</p>
                            </div>

                            <div class="flex gap-3">
                                <!-- Bouton Soumettre Image -->
                                <button onclick="sendImageRequest('${nom}', '${ref}')" class="h-12 w-12 rounded-2xl bg-blue-500/10 text-blue-400 hover:bg-blue-400 hover:text-black transition-all flex items-center justify-center border border-blue-500/20" title="Soumettre image">
                                    <i class="fas fa-camera"></i>
                                </button>
                                <button onclick="deleteProduct('${nom}')" class="h-12 w-12 rounded-2xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center border border-red-500/20" title="Supprimer">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `}).reverse().join('');
            } catch (e) {
                container.innerHTML = `<div class="text-center text-red-500 font-bold uppercase text-[10px] py-20">Erreur de connexion aux données</div>`;
            } finally {
                updateSyncUI(false);
            }
        }

        function sendImageRequest(nom, ref) {
            const phone = "243978415814";
            const text = `*SOUMISSION IMAGE PRODUIT*\n\nProduit: ${nom}\nRéférence: ${ref}\n\n_Veuillez joindre la photo ci-dessous._`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }

        document.getElementById('add-product-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';
            updateSyncUI(true);

            const data = {
                nom: document.getElementById('p-nom').value,
                prix: document.getElementById('p-prix').value,
                description: document.getElementById('p-desc').value,
                quantite: document.getElementById('p-quantite').value,
                abreviation: document.getElementById('p-abreviation').value || 'N/A'
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'add', data: data })
                });
                showToast("Produit ajouté !");
                document.getElementById('add-product-form').reset();
                setTimeout(loadAdminProducts, 2000);
            } catch (err) {
                showToast("Erreur d'envoi", true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-plus-circle"></i> Ajouter au catalogue';
                updateSyncUI(false);
            }
        };

        async function deleteProduct(nom) {
            if (!confirm(`Supprimer définitivement ${nom} ?`)) return;
            updateSyncUI(true);
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'delete', nom: nom })
                });
                showToast("Produit retiré");
                setTimeout(loadAdminProducts, 1500);
            } catch (e) { 
                showToast("Erreur", true);
                updateSyncUI(false);
            }
        }

        function logout() {
            localStorage.removeItem('lg_user_name');
            window.location.href = 'index.html';
        }

        window.onload = loadAdminProducts;
    </script>
</body>
</html>
