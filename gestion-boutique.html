<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - LeGrandArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #040404 0%, #1a1a1a 50%, #040404 100%); 
            color: #f8fafc; 
            min-height: 100vh;
        }
        .glass { 
            background: rgba(10, 10, 11, 0.85); 
            border: 1px solid rgba(255,255,255,0.12); 
            backdrop-filter: blur(25px); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .glass-card { 
            background: rgba(255,255,255,0.06); 
            border: 1px solid rgba(255,255,255,0.12); 
            backdrop-filter: blur(25px); 
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .hidden { display: none; }
        .btn-bold {
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1rem 2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }
        .btn-bold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.6);
        }
        .input-bold {
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-bold:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.3);
        }
        @media (max-width: 768px) {
            .btn-bold { padding: 0.8rem 1.5rem; font-size: 0.9rem; }
            .input-bold { padding: 0.8rem 1.2rem; }
            .glass, .glass-card { padding: 1.5rem; }
        }
    </style>
</head>
<body class="min-h-screen bg-[#050505]">
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-[1400px] mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-6 py-5">
            <div>
                <a href="index.html" class="text-3xl font-black text-white no-underline">LeGrand<span class="text-yellow-400">Art</span></a>
                <p class="text-xs uppercase tracking-[0.35em] text-gray-400 mt-1">Mon espace pour publier et gérer</p>
            </div>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition">Accueil</a>
                <button onclick="logout()" class="btn-bold">Se déconnecter</button>
            </div>
        </div>
    </header>

    <main id="dashboard-page" class="max-w-[1400px] mx-auto px-4 md:px-6 py-12 space-y-10">
        <section id="profile-card" class="glass rounded-[3rem] p-10 grid gap-8 md:grid-cols-[1.5fr_1fr] items-center">
            <div class="space-y-3">
                <div class="uppercase tracking-[0.35em] text-yellow-400 text-xs font-black">Mon Profil</div>
                <div class="flex items-center justify-between">
                    <div>
                        <h1 id="dash-name" class="text-4xl md:text-5xl font-black"></h1>
                        <p id="dash-role" class="text-gray-300 text-sm mt-2"></p>
                    </div>
                    <button onclick="editProfile()" class="text-emerald-400 hover:text-emerald-300 text-sm font-black uppercase tracking-widest">
                        <i class="fas fa-edit"></i> Modifier profil
                    </button>
                </div>
            </div>
        </section>
        <section class="glass rounded-[3rem] p-10">
            <div class="flex flex-col lg:flex-row justify-between gap-6">
                <div>
                    <h2 id="workspace-title" class="text-3xl font-black uppercase"></h2>
                    <p id="profile-detail" class="text-gray-400 mt-4 leading-relaxed"></p>
                </div>
                <div class="space-y-4">
                    <div class="p-6 rounded-[2rem] bg-white/5 border border-white/10">
                        <h3 id="action-title" class="text-sm uppercase tracking-[0.35em] text-yellow-400 font-black mb-3"></h3>
                        <button id="action-button" class="btn-bold w-full"></button>
                    </div>
                    <a href="gestion-boutique.html" class="btn-bold w-full text-center block">Gérer mes Produits</a>
                </div>
            </div>

            <div id="shop-form" class="hidden mt-10 glass-card rounded-[2rem] border border-white/10 p-8">
                <h3 class="text-xl font-black text-white mb-6">Créer une nouvelle boutique</h3>
                <form class="grid gap-6">
                    <input id="shop-name" placeholder="Nom de la boutique" class="input-bold w-full" required />
                    <textarea id="shop-desc" placeholder="Description de la boutique" rows="4" class="input-bold w-full" required></textarea>
                    <div class="grid md:grid-cols-2 gap-6">
                        <input id="shop-country" placeholder="Pays" class="input-bold" />
                        <input id="shop-city" placeholder="Ville" class="input-bold" />
                    </div>
                    <input id="shop-tags" placeholder="Tags / Catégories" class="input-bold w-full" />
                    <input id="shop-image" placeholder="URL image boutique" class="input-bold w-full" />
                    <button type="submit" class="btn-bold w-full">Enregistrer ma boutique</button>
                </form>
            </div>

            <div id="artwork-form" class="hidden mt-10 glass-card rounded-[2rem] border border-white/10 p-8">
                <h3 class="text-xl font-black text-white mb-6">Publier une nouvelle œuvre</h3>
                <form class="grid gap-6">
                    <input id="art-title" placeholder="Titre de l'œuvre" class="input-bold w-full" required />
                    <textarea id="art-desc" placeholder="Description de l'œuvre" rows="4" class="input-bold w-full" required></textarea>
                    <input id="art-image" placeholder="URL image de l'œuvre" class="input-bold w-full" />
                    <button type="submit" class="btn-bold w-full">Publier mon œuvre</button>
                </form>
            </div>
        </section>

        <section class="glass rounded-[3rem] p-10">
            <h2 class="text-3xl font-black uppercase mb-8">Mes Éléments</h2>
            <div id="content-list" class="grid gap-6 md:grid-cols-2"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
