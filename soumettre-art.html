<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T00CMP9WFH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T00CMP9WFH');
    </script>
    <title>Proposer mon art - LeGrandArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #f8fafc; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .input-field { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); color: white; }
        .input-field:focus { outline: none; border-color: #eab308; box-shadow: 0 0 0 4px rgba(234,179,8,0.12); }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-[#070707] border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-[1400px] mx-auto px-6 py-5 flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="index.html" class="text-2xl font-black uppercase tracking-tight text-white">LeGrand<span class="text-yellow-500">Art</span></a>
            <nav class="flex flex-wrap gap-3 items-center text-sm uppercase tracking-[0.25em] text-gray-400">
                <a href="index.html" class="hover:text-yellow-400 transition">Accueil</a>
                <a href="boutiques.html" class="hover:text-yellow-500 transition">Boutiques</a>
                <a href="gallerie.html" class="hover:text-yellow-500 transition">Galerie</a>
                <a href="soumettre-art.html" class="text-yellow-500">Soumettre</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 space-y-12">
        <section class="glass rounded-[3rem] p-10 md:p-16 border border-white/10 text-center">
            <span class="text-emerald-400 uppercase tracking-[0.35em] text-[10px] font-black">Partagez votre Talent</span>
            <h1 class="text-4xl md:text-6xl font-black text-white mt-4 leading-tight">Proposez votre <span class="text-yellow-500 italic">Œuvre</span>.</h1>
            <p class="text-gray-300 mt-6 text-lg max-w-2xl mx-auto">Contribuez à la galerie communautaire. Vos créations sont stockées localement et peuvent être soumises officiellement.</p>
        </section>

        <section class="glass rounded-[3rem] border border-white/10 p-8 md:p-12">
            <form id="art-form" class="space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="block text-xs uppercase tracking-[0.3em] text-gray-400 font-bold ml-2">Titre de l'œuvre *</label>
                        <input type="text" id="art-title" class="input-field w-full rounded-2xl px-6 py-4" placeholder="Ex: Renaissance Africaine" required>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs uppercase tracking-[0.3em] text-gray-400 font-bold ml-2">Nom de l'artiste *</label>
                        <input type="text" id="art-artist" class="input-field w-full rounded-2xl px-6 py-4" placeholder="Votre nom ou pseudo" required>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="block text-xs uppercase tracking-[0.3em] text-gray-400 font-bold ml-2">Catégorie *</label>
                        <select id="art-category" class="input-field w-full rounded-2xl px-6 py-4 appearance-none" required>
                            <option value="" disabled selected>Choisir une catégorie</option>
                            <option value="Peinture">Peinture</option>
                            <option value="Photo">Photo</option>
                            <option value="Art digital">Art digital</option>
                            <option value="Musique">Musique</option>
                            <option value="Danse">Danse</option>
                            <option value="Poésie">Poésie</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs uppercase tracking-[0.3em] text-gray-400 font-bold ml-2">Lien image (URL)</label>
                        <input type="url" id="art-image" class="input-field w-full rounded-2xl px-6 py-4" placeholder="https://images.unsplash.com/...">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs uppercase tracking-[0.3em] text-gray-400 font-bold ml-2">Description de l'œuvre *</label>
                    <textarea id="art-description" rows="5" class="input-field w-full rounded-3xl px-6 py-4" placeholder="Expliquez le concept, la technique, l'émotion..." required></textarea>
                </div>

                <div class="pt-4 text-center">
                    <button type="submit" class="w-full rounded-2xl bg-yellow-500 py-6 text-sm uppercase tracking-[0.3em] font-black text-black hover:bg-yellow-400 transition-all shadow-[0_20px_40px_-10px_rgba(234,179,8,0.3)]">
                        Ajouter à la galerie
                    </button>
                    <p id="form-status" class="mt-4 text-sm font-bold hidden"></p>
                </div>
            </form>
        </section>
    </main>

    <script>
        const DATA_KEY = 'lg_artworks';

        document.getElementById('art-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const status = document.getElementById('form-status');
            
            const work = {
                id: Date.now(),
                title: document.getElementById('art-title').value.trim(),
                artist: document.getElementById('art-artist').value.trim(),
                category: document.getElementById('art-category').value,
                image: document.getElementById('art-image').value.trim(),
                description: document.getElementById('art-description').value.trim(),
                date: new Date().toLocaleDateString('fr-FR'),
                createdAt: Date.now()
            };

            const works = JSON.parse(localStorage.getItem(DATA_KEY) || '[]');
            works.unshift(work);
            localStorage.setItem(DATA_KEY, JSON.stringify(works));
            
            status.innerText = 'Publication réussie ! Redirection vers la galerie...';
            status.className = 'mt-4 text-sm font-bold text-emerald-400';
            status.classList.remove('hidden');

            setTimeout(() => { window.location.href = 'gallerie.html'; }, 1500);
        });
    </script>
</body>
</html>
