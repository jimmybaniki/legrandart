<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Produits - LeGrandArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #040404 0%, #1a1a1a 50%, #040404 100%);
            --bg-glass: rgba(10, 10, 11, 0.85);
            --border-glass: rgba(255,255,255,0.12);
            --text-primary: #f8fafc;
            --text-secondary: #d1d5db;
            --accent: #fbbf24;
            --accent-hover: #f59e0b;
        }
        .light-theme {
            --bg-primary: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f8fafc 100%);
            --bg-glass: rgba(255, 255, 255, 0.9);
            --border-glass: rgba(0,0,0,0.1);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent: #10b981;
            --accent-hover: #059669;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .glass {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(25px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .glass-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(25px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .light-theme .glass-card {
            background: rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .hidden { display: none; }
        .btn-bold {
            background: linear-gradient(45deg, var(--accent), var(--accent-hover));
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1rem 2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }
        .btn-bold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.6);
        }
        .light-theme .btn-bold {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .light-theme .btn-bold:hover {
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        .input-bold {
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }
        .input-bold:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.3);
        }
        .light-theme .input-bold {
            background: rgba(0,0,0,0.05);
        }
        .light-theme .input-bold:focus {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3);
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-edit {
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }
        .btn-edit:hover {
            background: #2563eb;
        }
        @media (max-width: 768px) {
            .btn-bold { padding: 0.8rem 1.5rem; font-size: 0.9rem; }
            .input-bold { padding: 0.8rem 1.2rem; }
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-[1400px] mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-6 py-5">
            <div>
                <a href="index.html" class="text-3xl font-black text-white no-underline">LeGrand<span class="text-yellow-400">Art</span></a>
                <p class="text-xs uppercase tracking-[0.35em] text-gray-400 mt-1">Gestion des produits</p>
            </div>
            <div class="flex items-center gap-6">
                <a href="dashboard-client.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition">Retour au Dashboard</a>
                <button onclick="toggleTheme()" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition" title="Changer de thème">
                    <i class="fas fa-moon"></i> / <i class="fas fa-sun"></i>
                </button>
                <button onclick="logout()" class="btn-bold">Se déconnecter</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 md:px-6 py-12 space-y-10">
        <!-- Section Ajouter un Produit -->
        <section class="glass rounded-[3rem] p-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black uppercase">Ajouter un Produit</h2>
                <button onclick="toggleAddForm()" class="btn-bold flex items-center gap-2">
                    <i class="fas fa-plus"></i> Nouveau
                </button>
            </div>

            <form id="product-form" class="hidden grid gap-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <input id="product-name" placeholder="Nom du produit" class="input-bold" required />
                    <input id="product-category" placeholder="Catégorie" class="input-bold" />
                </div>
                <textarea id="product-desc" placeholder="Description du produit" rows="4" class="input-bold" required></textarea>
                <div class="grid md:grid-cols-3 gap-6">
                    <input id="product-price" placeholder="Prix (€)" type="number" step="0.01" class="input-bold" required />
                    <input id="product-stock" placeholder="Stock disponible" type="number" class="input-bold" required />
                    <input id="product-sku" placeholder="Code SKU" class="input-bold" />
                </div>
                <input id="product-image" placeholder="URL image du produit" class="input-bold w-full" />
                <div class="flex gap-4">
                    <button type="submit" class="btn-bold flex-1">Ajouter le Produit</button>
                    <button type="button" onclick="toggleAddForm()" class="btn-bold flex-1" style="background: #6b7280;">Annuler</button>
                </div>
            </form>
        </section>

        <!-- Section Filtres et Recherche -->
        <section class="glass rounded-[3rem] p-10">
            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <input id="search-box" placeholder="Rechercher un produit..." class="input-bold" />
                <select id="category-filter" class="input-bold">
                    <option value="">Toutes les catégories</option>
                    <option value="Art">Art</option>
                    <option value="Sculpture">Sculpture</option>
                    <option value="Peinture">Peinture</option>
                    <option value="Photographie">Photographie</option>
                </select>
                <input id="stock-filter" type="number" placeholder="Filtrer par stock min" class="input-bold" />
            </div>
        </section>

        <!-- Section Liste des Produits -->
        <section class="glass rounded-[3rem] p-10">
            <h2 class="text-3xl font-black uppercase mb-8">Mes Produits</h2>
            
            <!-- Tableau des produits -->
            <div class="overflow-x-auto">
                <table class="w-full divide-y divide-gray-600">
                    <thead class="bg-gray-800">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Image</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Nom</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Catégorie</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Prix</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Stock</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">SKU</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table" class="divide-y divide-gray-600">
                        <!-- Produits seront affichés ici dynamiquement -->
                    </tbody>
                </table>
            </div>

            <!-- Message si aucun produit -->
            <div id="no-products" class="text-center py-12">
                <i class="fas fa-inbox text-6xl text-gray-500 mb-4"></i>
                <p class="text-gray-400 text-lg">Aucun produit pour le moment. Créez votre premier produit !</p>
            </div>
        </section>

        <!-- Modal Édition Produit -->
        <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div class="glass rounded-[3rem] p-10 max-w-2xl w-full">
                <h2 class="text-2xl font-black uppercase mb-6">Modifier le Produit</h2>
                <form id="edit-form" class="grid gap-6">
                    <input id="edit-product-id" type="hidden" />
                    <div class="grid md:grid-cols-2 gap-6">
                        <input id="edit-product-name" placeholder="Nom du produit" class="input-bold" required />
                        <input id="edit-product-category" placeholder="Catégorie" class="input-bold" />
                    </div>
                    <textarea id="edit-product-desc" placeholder="Description du produit" rows="4" class="input-bold" required></textarea>
                    <div class="grid md:grid-cols-3 gap-6">
                        <input id="edit-product-price" placeholder="Prix (€)" type="number" step="0.01" class="input-bold" required />
                        <input id="edit-product-stock" placeholder="Stock disponible" type="number" class="input-bold" required />
                        <input id="edit-product-sku" placeholder="Code SKU" class="input-bold" />
                    </div>
                    <input id="edit-product-image" placeholder="URL image du produit" class="input-bold w-full" />
                    <div class="flex gap-4">
                        <button type="submit" class="btn-bold flex-1">Sauvegarder</button>
                        <button type="button" onclick="closeEditModal()" class="btn-bold flex-1" style="background: #6b7280;">Annuler</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Placeholder pour l'intégration Google Sheets
        const SHEET_API_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';

        let productsData = [];

        // Toggle form affichage
        function toggleAddForm() {
            document.getElementById('product-form').classList.toggle('hidden');
        }

        // Charger les produits au démarrage
        async function loadProducts() {
            try {
                const response = await fetch(`${SHEET_API_URL}?action=getProducts&shopId=${getCurrentShopId()}`);
                const result = await response.json();
                productsData = result.products || [];
                displayProducts(productsData);
            } catch (error) {
                console.error('Erreur lors du chargement des produits:', error);
                // Fallback avec produits statiques
                productsData = [
                    {
                        id: 'prod1',
                        name: 'Peinture Abstraite',
                        category: 'Peinture',
                        description: 'Une œuvre d\'art moderne abstraite',
                        price: 150.00,
                        stock: 5,
                        sku: 'PA-001',
                        image: 'https://via.placeholder.com/300'
                    },
                    {
                        id: 'prod2',
                        name: 'Sculpture Classique',
                        category: 'Sculpture',
                        description: 'Une sculpture en marbre',
                        price: 300.00,
                        stock: 2,
                        sku: 'SC-001',
                        image: 'https://via.placeholder.com/300'
                    }
                ];
                displayProducts(productsData);
            }
        }

        // Afficher les produits
        function displayProducts(products) {
            const table = document.getElementById('products-table');
            const noProducts = document.getElementById('no-products');
            
            if (products.length === 0) {
                table.innerHTML = '';
                noProducts.classList.remove('hidden');
                return;
            }
            
            noProducts.classList.add('hidden');
            table.innerHTML = products.map(product => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <img src="${product.image || 'https://via.placeholder.com/50'}" alt="${product.name}" class="h-12 w-12 rounded-lg object-cover">
                    </td>
                    <td class="px-6 py-4 font-semibold text-white">${product.name}</td>
                    <td class="px-6 py-4 text-gray-400">${product.category || 'N/A'}</td>
                    <td class="px-6 py-4 text-yellow-400 font-bold">${product.price} €</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-sm font-semibold ${product.stock > 5 ? 'bg-green-100 text-green-800' : product.stock > 0 ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800'}">
                            ${product.stock}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-400">${product.sku || 'N/A'}</td>
                    <td class="px-6 py-4 space-x-2">
                        <button onclick="editProduct('${product.id}')" class="btn-edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteProduct('${product.id}')" class="btn-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Ajouter un produit
        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const product = {
                name: document.getElementById('product-name').value,
                category: document.getElementById('product-category').value,
                description: document.getElementById('product-desc').value,
                price: document.getElementById('product-price').value,
                stock: document.getElementById('product-stock').value,
                sku: document.getElementById('product-sku').value,
                image: document.getElementById('product-image').value,
                shopId: getCurrentShopId()
            };

            try {
                const response = await fetch(SHEET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'addProduct', data: product })
                });
                const result = await response.json();
                if (result.success) {
                    alert('Produit ajouté avec succès !');
                    document.getElementById('product-form').reset();
                    toggleAddForm();
                    loadProducts();
                } else {
                    alert('Erreur lors de l\'ajout du produit.');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion.');
            }
        });

        // Éditer un produit
        function editProduct(productId) {
            const product = productsData.find(p => p.id === productId);
            if (!product) return;

            document.getElementById('edit-product-id').value = product.id;
            document.getElementById('edit-product-name').value = product.name;
            document.getElementById('edit-product-category').value = product.category;
            document.getElementById('edit-product-desc').value = product.description;
            document.getElementById('edit-product-price').value = product.price;
            document.getElementById('edit-product-stock').value = product.stock;
            document.getElementById('edit-product-sku').value = product.sku;
            document.getElementById('edit-product-image').value = product.image;

            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const product = {
                id: document.getElementById('edit-product-id').value,
                name: document.getElementById('edit-product-name').value,
                category: document.getElementById('edit-product-category').value,
                description: document.getElementById('edit-product-desc').value,
                price: document.getElementById('edit-product-price').value,
                stock: document.getElementById('edit-product-stock').value,
                sku: document.getElementById('edit-product-sku').value,
                image: document.getElementById('edit-product-image').value,
                shopId: getCurrentShopId()
            };

            try {
                const response = await fetch(SHEET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateProduct', data: product })
                });
                const result = await response.json();
                if (result.success) {
                    alert('Produit modifié avec succès !');
                    closeEditModal();
                    loadProducts();
                } else {
                    alert('Erreur lors de la modification du produit.');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion.');
            }
        });

        // Supprimer un produit
        async function deleteProduct(productId) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')) return;

            try {
                const response = await fetch(SHEET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'deleteProduct', productId: productId, shopId: getCurrentShopId() })
                });
                const result = await response.json();
                if (result.success) {
                    alert('Produit supprimé avec succès !');
                    loadProducts();
                } else {
                    alert('Erreur lors de la suppression du produit.');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion.');
            }
        }

        // Filtrer les produits
        function filterProducts() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            const category = document.getElementById('category-filter').value;
            const minStock = parseInt(document.getElementById('stock-filter').value) || 0;

            const filtered = productsData.filter(p => 
                (p.name.toLowerCase().includes(searchTerm)) &&
                (category === '' || p.category === category) &&
                (p.stock >= minStock)
            );

            displayProducts(filtered);
        }

        document.getElementById('search-box').addEventListener('input', filterProducts);
        document.getElementById('category-filter').addEventListener('change', filterProducts);
        document.getElementById('stock-filter').addEventListener('input', filterProducts);

        function getCurrentShopId() {
            return localStorage.getItem('currentShopId') || 'default';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const theme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
        }

        function logout() {
            window.location.href = 'index.html';
        }

        // Charger les produits au démarrage
        loadProducts();
    </script>
</body>
</html>
