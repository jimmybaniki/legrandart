<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration Générale - LeGrandArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #f8fafc; }
        .glass-card { background: rgba(15, 15, 17, 0.7); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .admin-btn { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .admin-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px -10px rgba(250, 204, 21, 0.3); }
    </style>
</head>
<body class="min-h-screen">
    <header class="border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-2xl font-black uppercase text-white">Admin<span class="text-yellow-500">Center</span></span>
                <span class="text-[9px] uppercase tracking-[0.4em] text-emerald-500 font-bold">LeGrandArt Ecosystem</span>
            </div>
            <a href="index.html" class="text-xs font-bold uppercase tracking-widest text-gray-500 hover:text-white">Quitter</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Dashboard Navigation -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
            <button onclick="showSection('shops')" class="admin-btn glass-card p-8 rounded-[2rem] text-left border-l-4 border-l-yellow-500">
                <i class="fas fa-store text-yellow-500 text-3xl mb-4"></i>
                <h3 class="font-black uppercase text-sm">Gérer les Boutiques</h3>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">Contrôle & Accès gérant</p>
            </button>
            <button onclick="alert('Module Agents en cours...')" class="admin-btn glass-card p-8 rounded-[2rem] text-left border-l-4 border-l-blue-500">
                <i class="fas fa-user-tie text-blue-500 text-3xl mb-4"></i>
                <h3 class="font-black uppercase text-sm">Gérer les Agents</h3>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">Commission & Secteurs</p>
            </button>
            <button onclick="alert('Module Users en cours...')" class="admin-btn glass-card p-8 rounded-[2rem] text-left border-l-4 border-l-purple-500">
                <i class="fas fa-users text-purple-500 text-3xl mb-4"></i>
                <h3 class="font-black uppercase text-sm">Gérer les Users</h3>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">Permissions & Comptes</p>
            </button>
            <button onclick="alert('Module Artistes en cours...')" class="admin-btn glass-card p-8 rounded-[2rem] text-left border-l-4 border-l-emerald-500">
                <i class="fas fa-palette text-emerald-500 text-3xl mb-4"></i>
                <h3 class="font-black uppercase text-sm">Gérer les Artistes</h3>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">Expositions & Profils</p>
            </button>
        </div>

        <!-- Shop Management Section -->
        <section id="section-shops" class="space-y-8">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black uppercase italic">Boutiques <span class="text-yellow-500">Enregistrées</span></h2>
                    <p class="text-gray-500 text-xs mt-2 uppercase tracking-widest">Liste synchronisée avec Google Sheets</p>
                </div>
                <div class="flex items-center gap-4">
                    <span id="admin-shops-count" class="bg-yellow-500/10 text-yellow-500 px-4 py-2 rounded-full text-[10px] font-black uppercase hidden">0 Boutiques</span>
                    <button onclick="loadShopsAdmin()" class="bg-white/5 hover:bg-white/10 px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest transition">Actualiser</button>
                </div>
            </div>

            <div id="admin-global-metrics" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 hidden"></div>

            <div id="admin-shop-list" class="grid gap-4">
                <div class="animate-pulse text-gray-600 uppercase text-[10px] font-black tracking-widest">Chargement de la base de données...</div>
            </div>
        </section>
    </main>

    <!-- Modal Édition Boutique -->
    <div id="edit-shop-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl">
        <div class="glass-card w-full max-w-2xl p-8 md:p-12 rounded-[3rem] border border-white/10 relative">
            <button onclick="closeEditModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>
            <h2 class="text-3xl font-black uppercase italic mb-8 text-white">Modifier <span class="text-yellow-500">Boutique</span></h2>
            
            <form id="edit-shop-form" class="grid gap-6 md:grid-cols-2">
                <input type="hidden" id="edit-shop-index">
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Nom de la boutique</label>
                    <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-yellow-500 text-white transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Propriétaire (Email)</label>
                    <input type="email" id="edit-email" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-yellow-500 text-white transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Téléphone</label>
                    <input type="text" id="edit-phone" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-yellow-500 text-white transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-gray-500 ml-2">Ville</label>
                    <input type="text" id="edit-city" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 outline-none focus:border-yellow-500 text-white transition-all">
                </div>
                <button type="submit" class="md:col-span-2 bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs transition-all">
                    Sauvegarder les modifications
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let allShopsAdmin = [];

        async function loadShopsAdmin() {
            const container = document.getElementById('admin-shop-list');
            const data = await readData("shops");
            allShopsAdmin = data;
            
            if (data && data.length > 0) {
                document.getElementById('admin-shops-count').innerText = `${data.length} Boutiques`;
                document.getElementById('admin-shops-count').classList.remove('hidden');
                
                const metrics = document.getElementById('admin-global-metrics');
                metrics.classList.remove('hidden');
                metrics.innerHTML = `
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-yellow-500">
                        <p class="text-[10px] text-gray-500 uppercase font-black">Boutiques Actives</p>
                        <p class="text-2xl font-black text-white">${data.length}</p>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500">
                        <p class="text-[10px] text-gray-500 uppercase font-black">Status Plateforme</p>
                        <p class="text-2xl font-black text-white">Opérationnel</p>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500">
                        <p class="text-[10px] text-gray-500 uppercase font-black">Dernière Sync</p>
                        <p class="text-2xl font-black text-white">${new Date().toLocaleTimeString()}</p>
                    </div>
                `;
            }

            if (!data || data.length === 0) {
                container.innerHTML = `<p class="text-gray-500 uppercase text-[10px] font-black py-10">Aucune boutique trouvée.</p>`;
                return;
            }

            container.innerHTML = data.map((shop, index) => {
                // On assume l'ordre des colonnes : [Nom, Email, Tel, Pays, Ville, Domaine, Bio, Objectifs]
                const name = Array.isArray(shop) ? shop[0] : (shop.shopName || "Sans nom");
                const owner = Array.isArray(shop) ? shop[1] : (shop.owner || "Inconnu");
                const domain = Array.isArray(shop) ? shop[5] : "Business";

                return `
                    <div class="glass-card p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center group">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 rounded-2xl bg-yellow-500/10 flex items-center justify-center text-yellow-500 font-black">
                                ${index + 1}
                            </div>
                            <div>
                                <h4 class="text-lg font-black text-white uppercase">${name}</h4>
                                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">${owner} • ${domain}</p>
                            </div>
                        </div>
                        <div class="flex gap-3 mt-4 md:mt-0">
                            <button onclick="loginAsManager('${name}')" class="px-6 py-3 rounded-xl bg-white text-black font-black uppercase text-[10px] tracking-widest hover:bg-yellow-500 transition">
                                <i class="fas fa-sign-in-alt mr-2"></i> Pénétrer
                            </button>
                            <button onclick="openEditModal(${index})" class="w-12 h-12 rounded-xl border border-white/5 hover:bg-yellow-500/20 hover:text-yellow-500 transition text-gray-500">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteShopAdmin(${index}, '${name}')" class="w-12 h-12 rounded-xl border border-white/5 hover:bg-red-500/20 hover:text-red-500 transition text-gray-500">
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showSection(name) {
            // Pour l'instant on n'a que la section shops
            console.log("Section active:", name);
        }

        function openEditModal(index) {
            const shop = allShopsAdmin[index];
            if (!shop) return;

            document.getElementById('edit-shop-index').value = index;
            document.getElementById('edit-name').value = Array.isArray(shop) ? shop[0] : (shop.shopName || "");
            document.getElementById('edit-email').value = Array.isArray(shop) ? shop[1] : (shop.email || "");
            document.getElementById('edit-phone').value = Array.isArray(shop) ? shop[2] : (shop.phone || "");
            document.getElementById('edit-city').value = Array.isArray(shop) ? shop[4] : (shop.city || "");

            document.getElementById('edit-shop-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-shop-modal').classList.add('hidden');
        }

        document.getElementById('edit-shop-form').onsubmit = async (e) => {
            e.preventDefault();
            const index = document.getElementById('edit-shop-index').value;
            const originalShop = allShopsAdmin[index];
            
            // Préparation des nouvelles valeurs (en gardant les autres colonnes intactes si existantes)
            const updatedValues = Array.isArray(originalShop) ? [...originalShop] : [originalShop.shopName, originalShop.owner, originalShop.phone, originalShop.country, originalShop.city];
            updatedValues[0] = document.getElementById('edit-name').value;
            updatedValues[1] = document.getElementById('edit-email').value;
            updatedValues[2] = document.getElementById('edit-phone').value;
            updatedValues[4] = document.getElementById('edit-city').value;

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "update",
                        sheetName: "shops",
                        rowIndex: parseInt(index) + 2, // Index 0 + 2 = Ligne 2 dans Sheets (après l'en-tête)
                        values: updatedValues
                    })
                });
                alert("Boutique mise à jour avec succès !");
                closeEditModal();
                loadShopsAdmin();
            } catch (err) {
                alert("Erreur lors de la mise à jour : " + err.message);
            }
        };

        async function deleteShopAdmin(index, shopName) {
            if (!confirm(`Êtes-vous sûr de vouloir supprimer la boutique "${shopName}" ? Cette action est irréversible.`)) {
                return;
            }

            try {
                // rowIndex est l'index de la ligne dans Google Sheets (base 1), +1 pour l'en-tête
                const success = await deleteEntry("shops", parseInt(index) + 2); 
                if (success) {
                    alert(`La boutique "${shopName}" a été supprimée avec succès.`);
                    loadShopsAdmin(); // Recharger la liste des boutiques
                }
            } catch (err) {
                alert("Erreur lors de la suppression de la boutique : " + err.message);
            }
        }

        window.onload = loadShopsAdmin;
    </script>
</body>
</html>
