<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - LeGrandArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #040404; color: #f8fafc; }
        .glass { background: rgba(10, 10, 11, 0.75); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(18px); }
        .glass-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen bg-[#050505]">
    <header class="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-[1400px] mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-6 py-5">
            <div>
                <a href="index.html" class="text-3xl font-black text-white no-underline">LeGrand<span class="text-yellow-400">Art</span></a>
                <p class="text-xs uppercase tracking-[0.35em] text-gray-400 mt-1">Mon espace pour publier et gérer</p>
            </div>
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition">Accueil</a>
                <button onclick="logout()" class="bg-yellow-400 text-black font-black uppercase tracking-[0.2em] px-5 py-3 rounded-full hover:bg-yellow-300 transition">Se déconnecter</button>
            </div>
        </div>
    </header>

    <main id="dashboard-page" class="max-w-[1400px] mx-auto px-4 md:px-6 py-12 space-y-10">
        <section id="profile-card" class="glass rounded-[3rem] p-10 grid gap-8 md:grid-cols-[1.5fr_1fr] items-center">
            <div class="space-y-3">
                <div class="uppercase tracking-[0.35em] text-yellow-400 text-xs font-black">Mon Profil</div>
                <div class="flex items-center justify-between">
                    <div>
                        <h1 id="dash-name" class="text-4xl md:text-5xl font-black"></h1>
                        <p id="dash-role" class="text-gray-300 text-sm mt-2"></p>
                    </div>
                    <button onclick="editProfile()" class="text-emerald-400 hover:text-emerald-300 text-sm font-black uppercase tracking-widest">
                        <i class="fas fa-edit"></i> Modifier profil
                    </button>
                </div>
            </div>
        </section>
        <section class="glass rounded-[3rem] p-10">
            <div class="flex flex-col lg:flex-row justify-between gap-6">
                <div>
                    <h2 id="workspace-title" class="text-3xl font-black uppercase"></h2>
                    <p id="profile-detail" class="text-gray-400 mt-4 leading-relaxed"></p>
                </div>
                <div class="space-y-4">
                    <div class="p-6 rounded-[2rem] bg-white/5 border border-white/10">
                        <h3 id="action-title" class="text-sm uppercase tracking-[0.35em] text-yellow-400 font-black mb-3"></h3>
                        <button id="action-button" class="bg-yellow-400 text-black font-black uppercase tracking-[0.2em] px-6 py-4 rounded-full hover:bg-yellow-300 transition w-full"></button>
                    </div>
                </div>
            </div>

            <div id="shop-form" class="hidden mt-10 glass-card rounded-[2rem] border border-white/10 p-8">
                <h3 class="text-xl font-black text-white mb-6">Créer une nouvelle boutique</h3>
                <form class="grid gap-6">
                    <input id="shop-name" placeholder="Nom de la boutique" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" required />
                    <textarea id="shop-desc" placeholder="Description de la boutique" rows="4" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" required></textarea>
                    <div class="grid md:grid-cols-2 gap-6">
                        <input id="shop-country" placeholder="Pays" class="rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" />
                        <input id="shop-city" placeholder="Ville" class="rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" />
                    </div>
                    <input id="shop-tags" placeholder="Tags / Catégories" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" />
                    <input id="shop-image" placeholder="URL image boutique" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" />
                    <button type="submit" class="w-full bg-yellow-400 text-black font-black uppercase tracking-[0.2em] px-6 py-4 rounded-full">Enregistrer ma boutique</button>
                </form>
            </div>

            <div id="artwork-form" class="hidden mt-10 glass-card rounded-[2rem] border border-white/10 p-8">
                <h3 class="text-xl font-black text-white mb-6">Publier une nouvelle œuvre</h3>
                <form class="grid gap-6">
                    <input id="art-title" placeholder="Titre de l'œuvre" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" required />
                    <textarea id="art-desc" placeholder="Description de l'œuvre" rows="4" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" required></textarea>
                    <input id="art-image" placeholder="URL image de l'œuvre" class="w-full rounded-3xl border border-white/10 bg-white/5 px-5 py-4 text-white outline-none" />
                    <button type="submit" class="w-full bg-yellow-400 text-black font-black uppercase tracking-[0.2em] px-6 py-4 rounded-full">Publier mon œuvre</button>
                </form>
            </div>
        </section>

        <section class="glass rounded-[3rem] p-10">
            <h2 class="text-3xl font-black uppercase mb-8">Mes Éléments</h2>
            <div id="content-list" class="grid gap-6 md:grid-cols-2"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
